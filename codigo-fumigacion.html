        // --- Highlight Logic ---
        function highlight(code) {
            // Escaping and highlighting
            let h = code
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                // Comments
                .replace(/(&lt;!--.*?--&gt;)/g, '<span class="cmnt">$1</span>')
                .replace(/(\/\*[\s\S]*?\*\/|\/\/.+)/g, '<span class="cmnt">$1</span>')
                // Tags
                .replace(/(&lt;\/?)([a-z1-6]+)/gi, '$1<span class="tag">$2</span>')
                // Attr
                .replace(/\s([a-z-]+)=/gi, ' <span class="attr">$1</span>=')
                // Values
                .replace(/"([^"]+)"/g, '"<span class="val">$1</span>"')
                // CSS
                .replace(/([a-z-]+):([^;]+);/gi, '<span class="attr">$1</span>:<span class="val">$2</span>;')
                // JS
                .replace(/\b(const|function|let|if|else|return|new|document|window)\b/g, '<span class="kw">$1</span>')
                .replace(/\b([a-z]+)\(/gi, '<span class="fn">$1</span>(')
                .replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
            return h;
        }

        // --- Render ---
        const codeRoot = document.getElementById('code-root');
        const numRoot = document.getElementById('numbers');
        const lines = rawCode.split('\n');
        
        numRoot.innerHTML = lines.map((_, i) => i + 1).join('\n');
        codeRoot.innerHTML = highlight(rawCode);

        document.getElementById('line-count').innerText = lines.length;
        document.getElementById('char-count').innerText = rawCode.length.toLocaleString();

        // --- Hover highlight ---
        const highLayer = document.getElementById('highlight');
        codeRoot.addEventListener('mousemove', (e) => {
            const rect = codeRoot.getBoundingClientRect();
            const y = e.clientY - rect.top;
            const lineIdx = Math.floor(y / (13 * 1.6));
            highLayer.style.opacity = 1;
            highLayer.style.top = (lineIdx * 13 * 1.6 + 20) + 'px';
        });

        codeRoot.addEventListener('mouseleave', () => highLayer.style.opacity = 0);

        // --- Copy Function ---
        function copyCode(btn) {
            navigator.clipboard.writeText(rawCode).then(() => {
                const text = document.getElementById('copy-text');
                const icon = document.getElementById('copy-icon');
                text.innerText = '✓ Copiado!';
                icon.innerText = '';
                btn.style.background = '#28C840';
                setTimeout(() => {
                    text.innerText = 'Copiar código';
                    icon.innerText = '📋';
                    btn.style.background = '#6C63FF';
                }, 2000);
            });
        }
